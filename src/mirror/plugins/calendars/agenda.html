{% if login_required %}
<a href="{{ auth_url }}" target="_blank">
    <img class="login-icon" src="/static/login.svg" alt="login" /> Login to see your calendars
</a>
{% else %}
<table>
    {% for item in items %}
    <tr>
        <td>{{item.start}}</td>
        <td><span class={{"dim" if item.subordinate else "current" if item.current else "" }}>{%if item.meals%}<img
                    class="icon" src="{{ url_for('meals.svg') }}" /> {%endif%}{{
                item.summary }}</span></td>
    </tr>
    {% else %}
    <tr>
        <td>No more jobs!</td>
    </tr>
    {% endfor %}
</table>
{% endif %}
